services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pawit
      POSTGRES_USER: pawit
      POSTGRES_PASSWORD: local-password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawit -d pawit"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pawit_postgres_data:/var/lib/postgresql/data

volumes:
  pawit_postgres_data:

